<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Remote Monitor — Secure web portal for monitoring your own Android device." />
  <title>Remote Monitor — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card glass-card">

      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="19" stroke="currentColor" stroke-width="2"/>
            <path d="M13 20L18 25L27 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="auth-title">Remote Monitor</h1>
        <p class="auth-subtitle">Secure device access portal</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><path d="M2.5 6.5L10 11L17.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
            </span>
            <input type="email" id="email" name="email" class="form-input" placeholder="admin@monitor.local" autocomplete="email" required />
          </div>
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </span>
            <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle password visibility">
              <svg viewBox="0 0 20 20" fill="none"><path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div id="loginAlert" class="alert" style="display:none"></div>

        <button type="submit" id="loginBtn" class="btn btn-primary btn-full">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner" style="display:none">
            <svg class="spinner" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg>
          </span>
        </button>
      </form>

      <p class="auth-footer">
        Secured with JWT + HTTPS &nbsp;•&nbsp; Your device only
      </p>
    </div>
  </div>

  <div class="auth-bg">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <script src="assets/js/auth.js"></script>
</body>
</html>
