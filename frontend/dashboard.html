<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Remote Monitor Dashboard — device overview." />
  <title>Dashboard — Remote Monitor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ── Sidebar ────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <a href="dashboard.html" class="sidebar-logo">
      <div class="sidebar-logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="sidebar-logo-text">RemoteMonitor</span>
    </a>

    <nav class="sidebar-nav" role="navigation" aria-label="Main navigation">
      <span class="nav-section-label">Overview</span>
      <a href="dashboard.html" class="nav-item" data-page="dashboard.html" id="nav-dashboard">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="1.8"/></svg></span>
        Dashboard
      </a>
      <a href="devices.html" class="nav-item" data-page="devices.html">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="7" y="2" width="10" height="20" rx="3" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg></span>
        Devices
        <span class="nav-item-badge" id="onlineCount">0</span>
      </a>

      <span class="nav-section-label" style="margin-top:8px">Monitor</span>
      <a href="live.html" class="nav-item" data-page="live.html">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M15 10l4.553-2.277A1 1 0 0121 8.645v6.71a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" stroke="currentColor" stroke-width="1.8"/></svg></span>
        Live View
      </a>
      <a href="camera.html" class="nav-item" data-page="camera.html">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.8"/></svg></span>
        Camera
      </a>
      <a href="location.html" class="nav-item" data-page="location.html">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/></svg></span>
        Location
      </a>

      <span class="nav-section-label" style="margin-top:8px">Account</span>
      <a href="settings.html" class="nav-item" data-page="settings.html">
        <span class="nav-item-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="currentColor" stroke-width="1.8"/></svg></span>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-md)">
        <div style="width:32px;height:32px;border-radius:50%;background:var(--clr-primary-glow);display:flex;align-items:center;justify-content:center;color:var(--clr-primary-light);font-weight:700;font-size:.875rem" id="userAvatar">A</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.8125rem;font-weight:600;color:var(--clr-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="sidebarUserName">Admin</div>
          <div style="font-size:.7rem;color:var(--clr-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="sidebarUserEmail"></div>
        </div>
        <button id="logoutBtn" class="btn btn-icon" title="Logout" style="color:var(--clr-text-muted);padding:6px">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────────── -->
  <div class="main-content">
    <header class="topbar">
      <button class="btn btn-icon" id="sidebarToggle" style="display:none;color:var(--clr-text-muted)">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="topbar-title">Dashboard</div>
      <div class="topbar-actions">
        <span id="connectionStatus" class="chip chip-gray" style="gap:6px">
          <span class="status-dot offline"></span> Connecting…
        </span>
        <button class="btn btn-ghost btn-sm" id="refreshBtn">↻ Refresh</button>
      </div>
    </header>

    <main class="page-body">

      <!-- Stats row -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none"><rect x="7" y="2" width="10" height="20" rx="3" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="statTotal">—</div><div class="stat-label">Total Devices</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="statOnline">—</div><div class="stat-label">Online Now</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon yellow"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="statBattery">—</div><div class="stat-label">Avg Battery</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="9" r="2.5" stroke="currentColor" stroke-width="1.8"/></svg></div>
          <div class="stat-info"><div class="stat-value" id="statLocations">—</div><div class="stat-label">GPS Updates</div></div>
        </div>
      </div>

      <!-- Device list -->
      <div class="section-header">
        <div>
          <div class="section-title">Your Devices</div>
          <div class="section-subtitle">Click a device to view live stream</div>
        </div>
      </div>

      <div class="devices-grid" id="devicesGrid">
        <!-- Populated by JS -->
        <div class="stat-card skeleton" style="height:180px"></div>
        <div class="stat-card skeleton" style="height:180px"></div>
      </div>

    </main>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
